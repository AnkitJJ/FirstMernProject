
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<script>
  let keyRef=null,valueRef=null,editMode=false;

 function save(){
    /*get references*/
    const key=document.getElementById("k");
    const val=document.getElementById("val");
    const  savebtn=document.getElementById("savebtn");
    const  result=document.getElementById("result");
    const  clearbtn=document.getElementById("clear");
    const mapobj=new Map();
        
  if(key.value && val.value){
    mapobj.set(key.value,val.value);
    /* Elements Creations*/
    const spank=document.createElement("span");
    const spanv=document.createElement("span");
    const colan=document.createElement("span");
    const ebtn=document.createElement("button");
    const dbtn=document.createElement("button");
    const div=document.createElement("div");

  
  
    /* Edit status*/

    if(editMode && keyRef && valueRef){
      keyRef.innerText=`${key.value}`;
      
      valueRef.innerText=`${mapobj.get(key.value)}`;
      keyRef=null;
      valueRef=null;
      editMode=false;
      key.value="";
      val.value="";
      savebtn.innerText="SAVE";
      return;
    }


    
    /* Set innerText into all Creation Element */
    ebtn.innerText="✏️";
    dbtn.innerText="❌";
    spank.innerText=`${key.value}`;
    colan.innerText=":";
    spanv.innerText=`${mapobj.get(key.value)}`; 


    /*apply CSS Dynamicaly*/

    /* div css control*/
    div.style.display="flex";
    div.style.gap="15px";
    div.style.marginTop="10px";

     /* data key & value css control*/
    spank.style.fontSize="30px";
    spank.style.color="lightgray";
    spanv.style.color="yellow";
    spanv.style.fontSize="30px";
    colan.style.fontSize="30px";
  /*button control*/

    ebtn.style.padding="5px 30px";
    ebtn.style.borderRadius="5px";
    ebtn.style.fontSize="22px";
    ebtn.style.background="black";
    ebtn.style.border="2px solid blue";
    
    dbtn.style.padding="5px 30px";
    dbtn.style.borderRadius="5px";
    dbtn.style.fontSize="22px";
    dbtn.style.background="red";
    dbtn.style.color="green ";
    
    dbtn.style.border="2px solid blue";
    
   /* append Element*/
  
  div.append(spank,colan,spanv,ebtn,dbtn);
    result.appendChild(div);
   
    /* Action perform on button click*/
    /* Edit Action*/
    
    ebtn.addEventListener('click',()=>{
      key.value=spank.innerText;
      key.readOnly=true;
      val.value=spanv.innerText;
      keyRef=spank;
      valueRef=spanv;
      editMode=true;
      savebtn.innerText="UPDATE";

    });





    /*Delete Action*/
    dbtn.addEventListener('click',()=>{
      if(confirm("do you want to delete!"))
      div.remove();

    });

    clearbtn.addEventListener('click',()=>{ 
      if(key.value!='')
      result.remove();
    else
    alert('Not Ant Data Exist To Clear!')
      
    });

    key.value="";
    val.value="";
  }
  else{

    alert("please insert key and value pair")
  }
    }
</script>


<!-- Start code of CSS-->

<style>
html,body{

  background-color: black;
}
#container{
height: 500px;
margin: auto;
width: 420px;
background-color:teal;
border-radius: 7px;
}
#sub-container{
display: flex;
flex-direction:column;
align-items: center;
justify-content: center;
}

#button{
display: flex;
gap: 30px;
}

h1{
color: aliceblue;
}
#span1,#span2{
color:greenyellow;
}
#k,#val{
padding: 7px 28px;
border-radius: 4px;
border: 1px solid greenyellow;
background-color:thistle;
outline: 0;
font-size: 25px;
}

#savebtn,#clear{
padding: 8px 53px;
font-weight: bold;
background-color: rgb(134, 134, 134);
font-size: 20px;
border-radius: 4px;
border: 1px solid greenyellow;
outline: 0;
}

#savebtn:hover{
background-color: rgb(17, 100, 17);
color:salmon;
border: 2px solid blueviolet;
}
#clear:hover{
background-color:red ;
color:black;
border: 2px solid blue;
}

</style>


</head>
<body>
<div id="container">

<div id="sub-container">
<h1><span id="span1">.....</span>CRUD OPERATION<span id="span2">.....</span></h1>
<input type="text" id="k" name="k" placeholder="Enter Key....."/><br><br>
<input type="text" id="val" name="val" placeholder="Enter Value....."/><br><br>
<div id="button">
<button onclick="save()" id="savebtn" name="savebtn">SAVE</button>
<button onclick="clear()" id="clear" name="clear">CLEAR</button>  
      </div><!--button-->     
    <div id="result"></div>
  </div><!--sub-container-->
</div><!--container-->
</body>
</html>
